name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Pipeline tests (FastAPI / NLP) ──────────────────────────────────────
  pipeline-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Clean any cached packages
          pip cache purge || true
          # Uninstall any existing conflicting packages
          pip uninstall -y spacy pydantic pydantic-core pydantic-settings || true
          # Install in correct order to avoid conflicts
          pip install "numpy<2.0"
          pip install "pydantic>=2.5.3,<3.0.0"
          pip install "spacy>=3.8.0"
          # Install remaining requirements
          pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
          # Install package without reinstalling dependencies
          pip install -e . --no-deps
          # Download NLTK data (needed for tests)
          python -m nltk.downloader punkt punkt_tab

      - name: Download spaCy model
        run: |
          python -m spacy download en_core_web_sm

      - name: Verify installation
        run: |
          python --version
          python -c "import spacy; print(f' spaCy: {spacy.__version__}')"
          python -c "import pydantic; print(f' Pydantic: {pydantic.__version__}')"
          python -c "from preprint_bot import config; print(' Package imports successfully')"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  # ── Django tests ────────────────────────────────────────────────────────
  django-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16  # PostgreSQL 16 with pgvector extension
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: preprint_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_NAME: preprint_bot_test
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pgvector extension
        run: |
          # Install in template1 so Django's test database inherits it
          PGPASSWORD=postgres psql -h localhost -U postgres -d template1 \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Install Django dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r django_site/requirements.txt

      - name: Verify Django setup
        working-directory: django_site
        run: |
          python manage.py check --deploy 2>&1 | head -20 || true
          python -c "import django; print(f'Django {django.VERSION}')"

      - name: Run Django tests
        working-directory: django_site
        run: |
          python manage.py test core -v 2
